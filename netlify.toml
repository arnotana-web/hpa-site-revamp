[build]
  publish = "palate"
  command = ""

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/menu"
  to = "/.netlify/functions/menu"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self)"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
